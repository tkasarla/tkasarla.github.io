version: 2
updates:
  # Ruby gems — what the site is actually built from
  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "weekly"

  # Keep GitHub Actions workflows up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Dev-only linting/formatting tools
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
